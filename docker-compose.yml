services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-choferes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-choferes_dev}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-choferes}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_USER: ${POSTGRES_USER:-choferes}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      DB_NAME: ${POSTGRES_DB:-choferes_dev}
      # PostgreSQL env vars expected by dist/config/config.js
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-choferes}
      PGPASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATABASE: ${POSTGRES_DB:-choferes_dev}
      PORT: 5000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev_super_secret_key_please_change_123456}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_please_change_654321}
      JWT_SECRET_KEY_REFRESH: ${JWT_SECRET_KEY_REFRESH:-dev_refresh_secret_key_please_change_abcdef1234567890}
    depends_on:
      - db
    ports:
      - "5001:5000"
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      REACT_APP_API_URL: http://localhost:5001
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data:

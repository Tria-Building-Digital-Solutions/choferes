name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install & Build API
        working-directory: ./api
        run: |
          npm ci
          npm run lint || true
          npm run build

      - name: Install & Build UI
        working-directory: ./ui
        run: |
          npm ci
          npm run lint || true
          npm run build

      - name: Run basic smoke tests
        run: |
          echo "Built API and UI successfully"
